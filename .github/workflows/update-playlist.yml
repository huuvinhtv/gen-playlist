name: Sync M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi để push nhánh mới

    steps:
      # 1. Checkout repo (không fix cứng nhánh nữa)
      - name: Checkout gen-playlist repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quan trọng: Kéo toàn bộ lịch sử nhánh về để rẽ nhánh không bị lỗi

      # 2. Checkout repo private chứa script
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          repository: huuvinhtv/engine
          path: engine
          token: ${{ secrets.ENGINE_TOKEN }}

      # 3. Cài đặt Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 4. Cài đặt thư viện
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 5. Chạy script (Nó sẽ tạo ra file playlist.m3u)
      - name: Run playlist engine
        run: |
          python engine/download_playlist.py

      # 6. Xử lý Git: Tự tạo nhánh và Push
      - name: Commit and push generated playlist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Xóa thư mục mã nguồn private
          rm -rf engine
          
          # Kéo thông tin nhánh m3u từ server về (nếu nhánh đã tồn tại)
          git fetch origin m3u || true
          
          # Thử chuyển sang nhánh m3u. Nếu nhánh chưa có, tự động tạo mới (-b)
          git checkout m3u || git checkout -b m3u
          
          # Cập nhật file m3u
          git add playlist.m3u
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update playlist"
            # Lệnh push -u sẽ tự động thiết lập liên kết cho nhánh mới tạo
            git push -u origin m3u
          fi
